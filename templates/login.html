<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Voice2Justice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-login">
    <!-- Global Loader -->
    <div id="global-loader"><div class="loader-spinner"></div></div>


<div class="container-500">
    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-shield-halved fa-3x mb-3"></i>
            <h4 class="mb-0 fw-bold">Admin Portal</h4>
            <p class="text-white-50 mb-0 small">Voice2Justice Authority Access</p>
        </div>
        <div class="login-body">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show text-center" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <div class="mb-3">
                    <label for="username" class="form-label text-muted small fw-bold" style="font-size:0.75rem;">USERNAME</label>
                    <input type="text" class="premium-input" id="username" name="username" required placeholder="admin">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-muted small fw-bold" style="font-size:0.75rem;">PASSWORD</label>
                    <input type="password" class="premium-input" id="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="landing-btn-primary w-100" style="border:none;cursor:pointer;">
                    Secure Login <i class="fa-solid fa-lock ms-2"></i>
                </button>
            </form>

            <div class="text-center mt-4">
                <small><a href="/" class="text-muted text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i>Back to Home</a></small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
