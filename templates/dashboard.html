<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Voice2Justice</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }
        .navbar-brand {
            font-weight: 700;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .stat-icon {
            font-size: 2.5rem;
            opacity: 0.8;
        }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 12px;
        }
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #6c757d;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="fa-solid fa-scale-balanced me-2"></i>Voice2Justice Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/dashboard"><i class="fa-solid fa-chart-line me-1"></i> Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="fa-solid fa-house me-1"></i> Public Site</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    
    <!-- Top Stats Row -->
    <div class="row g-4 mb-4" id="stats-container">
        <!-- Will be populated by JS -->
        <div class="col-12 text-center my-4" id="stats-loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <!-- Charts Row 1: Monthly Trends and Status Distribution -->
    <div class="row g-4 mb-4">
        <div class="col-lg-8">
            <div class="card h-100 p-3 position-relative">
                <div class="loading-overlay" id="trends-loading">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
                <h5 class="card-title">Monthly Complaint Trends</h5>
                <div class="chart-container">
                    <canvas id="trendsChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card h-100 p-3 position-relative">
                <div class="loading-overlay" id="status-loading">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
                <h5 class="card-title">Status Distribution</h5>
                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row 2: Categories and Recent Table -->
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card h-100 p-3 position-relative">
                <div class="loading-overlay" id="categories-loading">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
                <h5 class="card-title">Top 5 Categories</h5>
                <div class="chart-container">
                    <canvas id="categoriesChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card h-100 p-3 position-relative">
                <div class="loading-overlay" id="recent-loading">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
                <h5 class="card-title">Recent Complaints</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Citizen</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>PDF</th>
                            </tr>
                        </thead>
                        <tbody id="recent-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Custom Dashboard JS -->
<script src="/static/js/dashboard.js"></script>
</body>
</html>
