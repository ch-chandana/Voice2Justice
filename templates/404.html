<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Voice2Justice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { max-width: 600px; padding: 2rem; }
        .icon { font-size: 5rem; color: #4f46e5; margin-bottom: 1rem; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; margin: 0; color: #0f172a; }
        p { font-size: 1.1rem; color: #64748b; margin-bottom: 2rem; }
        .btn { display: inline-block; background: #4f46e5; color: white; padding: 0.75rem 1.5rem; border-radius: 30px; text-decoration: none; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <i class="fa-solid fa-map-location-dot icon"></i>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>We couldn't find the page you're looking for. It might have been moved or doesn't exist.</p>
        <a href="/" class="btn"><i class="fa-solid fa-house me-2"></i> Back to Home</a>
    </div>
</body>
</html>
